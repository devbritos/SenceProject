<!DOCTYPE html>
<html lang="en"> <!-- Se determinará el lenguaje de la pagina -->
<head> <!-- head se ocupa para enlazar extensiones, otros scrips, ponerle titulo a la pagina -->
        <!-- tambien para setear el formato y algunas configuraciones que varian segun el navegador -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explicando html</title>
    <link rel="stylesheet" href="assets/css/trabajo.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class = "bodycs"> <!-- body es el cuerpo principal de la pagina, Aca encerraremos todo el contenido basicamente -->
<header class = "container-fluid bg-dark text-white p-3">
    <!-- Header es el encabezado aca entraría dentro el nav y el encabezado principal --> 
    <div class = "d-flex justify-content-between align-items-center">
        <h1 class = "hcolor">Tienda principal Alambrito</h1><!-- Encabezado mas grande -->
        <nav><!--Etiqueta semántica donde organizaremos los links -->
            <a href="#" class= "text-white">Inicio</a>
            <a href="#"class= "text-white">Contacto</a>
            <a href="#"class= "text-white">Registrarse</a>
        </nav>
    </div>
</header>

<section class = "container "> <!--Etiqueta semántica donde se AGRUPA el contenido principal -->
    <div class = "row">
        <div class = "col-md-9 border contenido">
            <p class = "text-gray">Aqui encontrarás los mejores productos!</p><!--Parrafo-->
        <div class = "row">   
            <div class="col-12 col-md-6 col-lg-3">
                <img src="assets/img/tripack.png" class="img-fluid">
                <p class="fw-bold text-center">Tripack Pokemon $100</p>
            </div>
            <div class="col-12 col-md-6 col-lg-3">
                <img src="assets/img/charizar.png" class="img-fluid">
                <p class="fw-bold text-center">Carta charizard</p>
            </div>
            <div class="col-12 col-md-6 col-lg-3">
                <img src="assets/img/garde.png" class="img-fluid">
                <p class="fw-bold text-center">Carta gardevoir</p>
            </div>
            <div class="col-12 col-md-6 col-lg-3">
                <img src="assets/img/pika.png" class="img-fluid">
                <p class="fw-bold text-center">Carta Pikachu</p>
            </div>
        </div>
        </div> 
        <aside class = "col-md-3 border lat late"> <!--Etiqueta semántica donde se refiere donde esta el sidebar-->
            <p class = "text-gray">Articulos en descuento!</p>
            <div class = "row">
                <div class = "col-3 cenimg">
                    <img src="assets/img/pikabox.jpg" alt="" class = "img-fluid">
                </div>
            </div>
            <article><!--Etiqueta semantica donde se especifica un contenido en especial-->
                Mira lo nuevo que esta en tendencia->
            </article>
        </aside>
    </div>
</section>

<footer class = "container-fluid bg-dark"> <!--Pie de la pagina -->
    <div class  = "row justify-content-center">
        <div class = "col-auto">
            <p class = "text-white footer-text">Gracias por visitarnos</p>
        </div>
    </div>
</footer>
<button id = "btnSubir" class = "btn btn-primary">↑</button>
<script src = "assets/js/app.js"></script>
</body>
</html>
